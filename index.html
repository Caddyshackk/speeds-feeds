<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CNC Speeds & Feeds Calculator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="background-grid"></div>
    <div class="background-glow"></div>
    
    <div class="container">
        <header class="main-header">
            <div class="header-content">
                <div class="logo-section">
                    <div class="logo-icon">
                        <svg viewBox="0 0 50 50" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <circle cx="25" cy="25" r="20" stroke="currentColor" stroke-width="2"/>
                            <path d="M25 15 L25 35 M15 25 L35 25" stroke="currentColor" stroke-width="3"/>
                        </svg>
                    </div>
                    <div>
                        <h1>CNC CALCULATOR</h1>
                        <p class="subtitle">Speeds & Feeds Optimization</p>
                    </div>
                </div>
                <div class="header-controls">
                    <button id="saveLibraryBtn" class="btn btn-ghost">
                        <span class="icon">💾</span>
                        <span>Export</span>
                    </button>
                    <button id="loadLibraryBtn" class="btn btn-ghost">
                        <span class="icon">📁</span>
                        <span>Import</span>
                    </button>
                </div>
            </div>
        </header>

        <div class="main-content">
            <!-- Machine Type Selection -->
            <div class="card machine-card">
                <div class="card-header">
                    <h2>MACHINE TYPE</h2>
                    <div class="header-line"></div>
                </div>
                <div class="machine-type-selector">
                    <button class="machine-btn active" data-type="mill">
                        <span class="machine-icon">⚙</span>
                        <span class="machine-name">MILL</span>
                    </button>
                    <button class="machine-btn" data-type="lathe">
                        <span class="machine-icon">🔧</span>
                        <span class="machine-name">LATHE</span>
                    </button>
                    <button class="machine-btn" data-type="drill">
                        <span class="machine-icon">🔩</span>
                        <span class="machine-name">DRILL</span>
                    </button>
                </div>
            </div>

            <!-- Input Section -->
            <div class="card input-card">
                <div class="card-header">
                    <h2>PARAMETERS</h2>
                    <div class="header-line"></div>
                </div>
                
                <div class="input-grid">
                    <div class="input-group">
                        <label for="toolMaterial">Tool Material</label>
                        <select id="toolMaterial">
                            <option value="hss">HSS (High Speed Steel)</option>
                            <option value="carbide" selected>Carbide</option>
                            <option value="coated">Coated Carbide</option>
                            <option value="ceramic">Ceramic</option>
                        </select>
                    </div>

                    <div class="input-group">
                        <label for="workMaterial">Work Material</label>
                        <select id="workMaterial">
                            <option value="aluminum">Aluminum</option>
                            <option value="mild_steel" selected>Mild Steel</option>
                            <option value="stainless">Stainless Steel</option>
                            <option value="tool_steel">Tool Steel</option>
                            <option value="titanium">Titanium</option>
                            <option value="brass">Brass</option>
                            <option value="plastic">Plastic</option>
                        </select>
                    </div>

                    <!-- Mill/Drill Specific -->
                    <div id="millDrillInputs" class="mill-drill-inputs">
                        <div class="input-group">
                            <label for="toolDiameter">Tool Diameter (in)</label>
                            <input type="number" id="toolDiameter" step="0.001" value="0.500" min="0.001">
                        </div>

                        <div class="input-group">
                            <label for="numFlutes">Number of Flutes</label>
                            <input type="number" id="numFlutes" value="4" min="1" max="12">
                        </div>

                        <div class="input-group with-hint">
                            <label for="chipLoad">Chip Load (in/tooth)</label>
                            <div class="input-with-button">
                                <input type="number" id="chipLoad" step="0.0001" value="0.0030" min="0.0001">
                                <button class="btn-hint" id="chipLoadHint">
                                    <span>💡</span>
                                </button>
                            </div>
                        </div>
                    </div>

                    <!-- Lathe Specific -->
                    <div id="latheInputs" class="lathe-inputs" style="display: none;">
                        <div class="input-group">
                            <label for="workDiameter">Work Diameter (in)</label>
                            <input type="number" id="workDiameter" step="0.001" value="2.000" min="0.001">
                        </div>

                        <div class="input-group with-hint">
                            <label for="feedPerRev">Feed/Rev (in/rev)</label>
                            <div class="input-with-button">
                                <input type="number" id="feedPerRev" step="0.001" value="0.010" min="0.001">
                                <button class="btn-hint" id="feedPerRevHint">
                                    <span>💡</span>
                                </button>
                            </div>
                        </div>
                    </div>

                    <div class="input-group with-hint">
                        <label for="sfm">Surface Speed (SFM)</label>
                        <div class="input-with-button">
                            <input type="number" id="sfm" step="1" value="500" min="1">
                            <button class="btn-hint" id="sfmHint">
                                <span>💡</span>
                            </button>
                        </div>
                    </div>

                    <div class="input-group">
                        <label for="depthOfCut">Depth of Cut (in)</label>
                        <input type="number" id="depthOfCut" step="0.001" value="0.100" min="0.001">
                    </div>

                    <div class="input-group">
                        <label for="widthOfCut">Width of Cut (in)</label>
                        <input type="number" id="widthOfCut" step="0.001" value="0.250" min="0.001">
                    </div>
                </div>

                <button id="calculateBtn" class="btn btn-primary">
                    <span class="btn-text">CALCULATE</span>
                    <span class="btn-arrow">→</span>
                </button>
            </div>

            <!-- Results Section -->
            <div class="card results-card">
                <div class="card-header">
                    <h2>RESULTS</h2>
                    <div class="header-line"></div>
                </div>
                <div class="results-grid">
                    <div class="result-item">
                        <div class="result-icon">⚡</div>
                        <div class="result-content">
                            <div class="result-label">RPM</div>
                            <div class="result-value" id="rpmResult">---</div>
                        </div>
                    </div>
                    <div class="result-item">
                        <div class="result-icon">📊</div>
                        <div class="result-content">
                            <div class="result-label">FEED RATE</div>
                            <div class="result-value" id="feedRateResult">---</div>
                        </div>
                    </div>
                    <div class="result-item">
                        <div class="result-icon">🔥</div>
                        <div class="result-content">
                            <div class="result-label">MRR</div>
                            <div class="result-value" id="mrrResult">---</div>
                        </div>
                    </div>
                    <div class="result-item">
                        <div class="result-icon">⚙</div>
                        <div class="result-content">
                            <div class="result-label">POWER</div>
                            <div class="result-value" id="powerResult">---</div>
                        </div>
                    </div>
                </div>
                <button id="saveToolBtn" class="btn btn-secondary">
                    <span>💾</span>
                    <span>SAVE TO LIBRARY</span>
                </button>
            </div>

            <!-- Custom Tool Library -->
            <div class="card library-card">
                <div class="card-header">
                    <h2>TOOL LIBRARY</h2>
                    <div class="header-line"></div>
                </div>
                <div id="customLibrary" class="library-content">
                    <p class="empty-state">No custom tools saved yet</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal for saving tool -->
    <div id="saveModal" class="modal">
        <div class="modal-backdrop"></div>
        <div class="modal-content">
            <div class="modal-header">
                <h3>SAVE CONFIGURATION</h3>
                <div class="header-line"></div>
            </div>
            <div class="input-group">
                <label for="toolName">Tool Name</label>
                <input type="text" id="toolName" placeholder="e.g., 1/2 Carbide End Mill - Aluminum">
            </div>
            <div class="modal-buttons">
                <button id="confirmSaveBtn" class="btn btn-primary">SAVE</button>
                <button id="cancelSaveBtn" class="btn btn-secondary">CANCEL</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
