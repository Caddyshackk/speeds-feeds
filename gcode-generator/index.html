<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>G-Code Generator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="background-grid"></div>
    <div class="background-glow"></div>
    
    <div class="container">
        <header class="main-header">
            <div class="header-content">
                <div class="logo-section">
                    <div class="logo-icon">
                        <svg viewBox="0 0 50 50" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M10 25 L20 15 L30 25 L40 15" stroke="currentColor" stroke-width="3" fill="none"/>
                            <path d="M10 35 L40 35" stroke="currentColor" stroke-width="3"/>
                        </svg>
                    </div>
                    <div>
                        <h1>G-CODE GENERATOR</h1>
                        <p class="subtitle">Automated Toolpath Creation</p>
                    </div>
                </div>
                <div class="header-controls">
                    <a href="../index.html" class="btn btn-ghost" style="text-decoration: none;">
                        <span class="icon">🔙</span>
                        <span>Calculator</span>
                    </a>
                </div>
            </div>
        </header>

        <div class="main-content">
            <!-- Left Panel: Inputs -->
            <div class="left-panel">
                <!-- Machine Type Selection -->
                <div class="section">
                    <h3 class="section-title">MACHINE TYPE</h3>
                    <div class="machine-buttons">
                        <button class="machine-btn active" data-type="mill">
                            <span class="machine-icon">⚙️</span>
                            <span class="machine-name">MILL</span>
                        </button>
                        <button class="machine-btn" data-type="lathe">
                            <span class="machine-icon">🔧</span>
                            <span class="machine-name">LATHE</span>
                        </button>
                    </div>
                </div>

                <!-- Operation Type -->
                <div class="section">
                    <h3 class="section-title">OPERATION</h3>
                    
                    <!-- Mill Operations -->
                    <div id="millOperations" class="operation-grid">
                        <button class="operation-btn active" data-operation="circle-pocket">
                            <span class="op-icon">⭕</span>
                            <span class="op-name">Circle Pocket</span>
                        </button>
                        <button class="operation-btn" data-operation="circle-profile">
                            <span class="op-icon">◯</span>
                            <span class="op-name">Circle Profile</span>
                        </button>
                        <button class="operation-btn" data-operation="rectangle-pocket">
                            <span class="op-icon">▣</span>
                            <span class="op-name">Rectangle Pocket</span>
                        </button>
                        <button class="operation-btn" data-operation="rectangle-profile">
                            <span class="op-icon">▢</span>
                            <span class="op-name">Rectangle Profile</span>
                        </button>
                        <button class="operation-btn" data-operation="bolt-circle">
                            <span class="op-icon">⊚</span>
                            <span class="op-name">Bolt Circle</span>
                        </button>
                        <button class="operation-btn" data-operation="slot">
                            <span class="op-icon">⬭</span>
                            <span class="op-name">Slot</span>
                        </button>
                    </div>

                    <!-- Lathe Operations -->
                    <div id="latheOperations" class="operation-grid" style="display: none;">
                        <button class="operation-btn active" data-operation="face">
                            <span class="op-icon">━</span>
                            <span class="op-name">Face</span>
                        </button>
                        <button class="operation-btn" data-operation="turn-od">
                            <span class="op-icon">│</span>
                            <span class="op-name">Turn OD</span>
                        </button>
                        <button class="operation-btn" data-operation="groove">
                            <span class="op-icon">⫿</span>
                            <span class="op-name">Groove</span>
                        </button>
                        <button class="operation-btn" data-operation="counterbore">
                            <span class="op-icon">⊔</span>
                            <span class="op-name">Counterbore</span>
                        </button>
                        <button class="operation-btn" data-operation="thread">
                            <span class="op-icon">⍋</span>
                            <span class="op-name">Thread</span>
                        </button>
                    </div>
                </div>

                <!-- Parameters Section -->
                <div class="section">
                    <h3 class="section-title">PARAMETERS</h3>
                    <div id="parametersContainer" class="parameters-container">
                        <!-- Dynamic inputs go here -->
                    </div>
                </div>

                <!-- Generate Button -->
                <button id="generateBtn" class="btn btn-primary btn-large">
                    <span class="icon">⚡</span>
                    <span>GENERATE G-CODE</span>
                </button>
            </div>

            <!-- Right Panel: Preview & Output -->
            <div class="right-panel">
                <!-- Toolpath Preview -->
                <div class="section">
                    <h3 class="section-title">TOOLPATH PREVIEW</h3>
                    <div class="preview-container">
                        <canvas id="previewCanvas" width="600" height="600"></canvas>
                    </div>
                </div>

                <!-- G-Code Output -->
                <div class="section">
                    <div class="output-header">
                        <h3 class="section-title">G-CODE OUTPUT</h3>
                        <div class="output-controls">
                            <button id="copyBtn" class="btn btn-ghost btn-small">
                                <span class="icon">📋</span>
                                <span>Copy</span>
                            </button>
                            <button id="downloadBtn" class="btn btn-ghost btn-small">
                                <span class="icon">💾</span>
                                <span>Download</span>
                            </button>
                        </div>
                    </div>
                    <div class="gcode-output">
                        <pre id="gcodeDisplay">(G-code will appear here after generation)</pre>
                    </div>
                </div>

                <!-- Stats -->
                <div class="section">
                    <h3 class="section-title">STATISTICS</h3>
                    <div class="stats-grid">
                        <div class="stat-item">
                            <span class="stat-label">Lines:</span>
                            <span class="stat-value" id="statLines">0</span>
                        </div>
                        <div class="stat-item">
                            <span class="stat-label">Est. Time:</span>
                            <span class="stat-value" id="statTime">0:00</span>
                        </div>
                        <div class="stat-item">
                            <span class="stat-label">Total Depth:</span>
                            <span class="stat-value" id="statDepth">0.000"</span>
                        </div>
                        <div class="stat-item">
                            <span class="stat-label">Passes:</span>
                            <span class="stat-value" id="statPasses">0</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
